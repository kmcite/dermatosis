name: dermatosis
description: regarding dermatosis
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.7
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.6
  uuid: ^4.4.0
  font_awesome_flutter: ^10.7.0
  flutter_native_splash: ^2.4.1
  states_rebuilder: ^6.4.0
  colornames: ^0.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  package_info_plus: ^9.0.0
  # manager:
  #   path: ..//manager
  objectbox: ^5.0.4
  objectbox_flutter_libs: ^5.0.4
  forui: ^0.16.0
  path: ^1.9.1

dev_dependencies:
  objectbox_generator: ^5.0.4
  flutter_launcher_icons: ^0.14.4
  json_serializable: ^6.7.1
  freezed: ^3.2.3
  build_runner: ^2.3.3
flutter:
  assets:
    - assets/
    # - shorebird.yaml
  uses-material-design: true
flutter_native_splash:
  image: "assets/dermatosis.png"
  color: "#000000"
  background_image: "assets/hospital_bg.png"

flutter_launcher_icons:
  android: "launcher_icon"
  # ios: true
  image_path: "assets/dermatosis.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/dermatosis.png"
    # background_color: "#hexcode"
    # theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/dermatosis.png"
    icon_size: 72 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/dermatosis.png"
# dart run flutter_native_splash:create
# dart run flutter_launcher_icons
